# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
title: blank
first_name: Danial
middle_name:
last_name: Samadi Vahdati
email: danielsvahdati@gmail.com
description: >
  PhD candidate in Electrical & Computer Engineering at Drexel University.
  Researching deepfake detection, AI security, and synthetic media forensics.
  Publishing at NeurIPS and CVPR. Collaborating with NVIDIA Research.
  Open to industry roles in AI/ML research and applied science.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with 
  <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: deepfake detection, AI security, synthetic media forensics, machine learning, computer vision
lang: en
icon: 🔬
url: https://danielvahdati.github.io
baseurl: ""
last_updated: true
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false # cleaner look for industry audience

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
rss_icon: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: false
search_enabled: false
socials_in_search: false
bib_search: true

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
serve_og_meta: true
serve_schema_org: true
og_image: /assets/img/profile.jpg # update when you add your headshot

# -----------------------------------------------------------------------------
# Social links — shown in footer and about page
# -----------------------------------------------------------------------------
contact_note: # leave blank
github_username: Danielvahdati
linkedin_username: danial-vahdati-6a652b169
scholar_userid: FzqABy8AAAAJ
orcid_id: # add if you have one
twitter_username: # add if you want
medium_username: # add later when you start blogging

# -----------------------------------------------------------------------------
# Analytics — add your Google Analytics ID later
# -----------------------------------------------------------------------------
google_analytics: G-33BE8H1DW9

# -----------------------------------------------------------------------------
# Publications
# -----------------------------------------------------------------------------
enable_publication_badges:
  altmetric: false
  dimensions: true
  inspirehep: false

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview, award]
max_author_limit: 5
more_authors_animation_delay: 10

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  teaching:
    output: true
    permalink: /teaching/:path/

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name: "Notes on AI Security"
blog_description: "Technical writing on AI-Generated Media Detection, AI Security, and Multimedia Forensics."
permalink: /blog/:year/:title/
pagination:
  enabled: true

# -----------------------------------------------------------------------------
# Collections defaults
# -----------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      related_posts: true
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: news
    values:
      layout: post

# -----------------------------------------------------------------------------
# HTML Compression
# -----------------------------------------------------------------------------
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - LICENSE
  - readme_preview/
  - vendor

plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  # - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar (publications)
# -----------------------------------------------------------------------------
scholar:
  last_name: [Samadi Vahdati, Vahdati]
  first_name: [Danial, D.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"

# -----------------------------------------------------------------------------
# Jekyll link attributes
# -----------------------------------------------------------------------------
external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

# -----------------------------------------------------------------------------
# Sitemap
# -----------------------------------------------------------------------------
sitemap: true

